@if (isOpen) {
  <div class="tl-modal-backdrop" (mousedown)="onBackdropClick($event)" role="presentation">
    <div
      #modalContainer
      class="tl-modal-container"
      [class]="'tl-modal-' + size"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="title ? modalId + '-title' : null"
      tabindex="-1"
    >
      <div class="tl-modal-header">
        @if (title) {
          <h2 [id]="modalId + '-title'" class="tl-modal-title">{{ title }}</h2>
        }
        <button type="button" class="tl-modal-close-btn" (click)="close()" aria-label="Close modal">
          <tl-icon name="close"></tl-icon>
        </button>
      </div>

      <div class="tl-modal-body">
        <ng-content select="[tl-modal-body]"></ng-content>
      </div>

      <div class="tl-modal-footer">
        <ng-content select="[tl-modal-footer]"></ng-content>
      </div>
    </div>
  </div>
}
