@if (isOpen) {
  <div class="tl-modal-backdrop" (click)="onBackdropClick($event)" role="presentation">
    <div
      class="tl-modal-container"
      [class]="'tl-modal-' + size"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="modalTitleId"
      [attr.aria-describedby]="modalBodyId"
    >
      <div class="tl-modal-header">
        <h2 [attr.id]="modalTitleId" class="tl-modal-title">
          <ng-content select="[tl-modal-header]">
            {{ title }}
          </ng-content>
        </h2>
        <button class="tl-modal-close-btn" (click)="closeModal()" aria-label="Đóng hộp thoại">
          <tl-icon name="close"></tl-icon>
        </button>
      </div>

      <div [attr.id]="modalBodyId" class="tl-modal-body">
        <ng-content select="[tl-modal-body]"></ng-content>
      </div>

      <div class="tl-modal-footer">
        <ng-content select="[tl-modal-footer]"></ng-content>
      </div>
    </div>
  </div>
}
