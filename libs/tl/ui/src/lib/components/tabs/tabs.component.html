<div class="tl-tabs-container" [ngClass]="position">
  <div
    class="tl-tabs-nav-bar"
    role="tablist"
    [attr.aria-orientation]="
      position === 'left' || position === 'right' ? 'vertical' : 'horizontal'
    "
  >
    @for (tab of tabItems; track $index) {
      <button
        #tabHeader
        type="button"
        role="tab"
        [attr.id]="tabIds[$index]?.buttonId"
        [attr.aria-controls]="tabIds[$index]?.panelId"
        [attr.aria-selected]="activeTabIndex === $index"
        [attr.tabindex]="activeTabIndex === $index ? 0 : -1"
        class="tl-tabs-header-item"
        [class.active]="activeTabIndex === $index"
        [class.disabled]="tab.disabled"
        [disabled]="tab.disabled"
        (click)="selectTab($index, tab.disabled)"
        (keydown.space)="$event.preventDefault(); selectTab($index, tab.disabled)"
      >
        @if (tab.customLabel) {
          <ng-container [ngTemplateOutlet]="tab.customLabel.templateRef"></ng-container>
        } @else {
          <span class="tl-tab-label-text">{{ tab.label }}</span>
        }
      </button>
    }

    <div
      class="tl-tabs-ink-bar"
      [style.width.px]="inkBarWidth"
      [style.height.px]="inkBarHeight"
      [style.transform]="
        position === 'top' || position === 'bottom'
          ? 'translateX(' + inkBarLeft + 'px)'
          : 'translateY(' + inkBarTop + 'px)'
      "
    ></div>
  </div>

  <div class="tl-tabs-content-viewport">
    @for (tab of tabItems; track $index) {
      @if (activeTabIndex === $index) {
        <div
          class="tl-tabs-content-pane"
          role="tabpanel"
          [attr.id]="tabIds[$index]?.panelId"
          [attr.aria-labelledby]="tabIds[$index]?.buttonId"
        >
          @if (tab.lazyContent) {
            <ng-container [ngTemplateOutlet]="tab.lazyContent.templateRef"></ng-container>
          } @else {
            <ng-container [ngTemplateOutlet]="tab.contentTemplate"></ng-container>
          }
        </div>
      }
    }
  </div>
</div>
