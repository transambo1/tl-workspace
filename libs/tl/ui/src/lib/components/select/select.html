<div class="tl-select-wrapper">
  @if (label) {
    <label class="tl-select-label">{{ label }}</label>
  }

  <div
    class="tl-select-trigger"
    [class.is-open]="isOpen"
    [class.is-disabled]="disabled"
    (click)="toggleDropdown()"
  >
    <span class="tl-select-display-value" [class.placeholder]="!selectedValue">
      {{ selectedLabel }}
    </span>
    <div class="tl-select-actions">
      <span
        class="tl-select-clear"
        [class.is-hidden]="!clearable || selectedValue === null"
        (click)="clearSelection($event)"
      >
        ✕
      </span>
      <span class="tl-select-arrow" [class.is-open]="isOpen">▼</span>
    </div>
  </div>

  @if (isOpen) {
    <ul class="tl-select-dropdown">
      @for (option of options; track option.value) {
        <li
          class="tl-select-option"
          [class.active]="option.value === selectedValue"
          [class.disabled]="option.disabled"
          (click)="$event.stopPropagation(); selectOption(option)"
        >
          {{ option.label }}

          @if (option.value === selectedValue) {
            <span class="tl-select-check">✓</span>
          }
        </li>
      } @empty {
        <li class="tl-select-empty">Invalid data</li>
      }
    </ul>
  }
</div>
